<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: file:; script-src 'self'; style-src 'self'; img-src 'self' data: file:;" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Companion Desktop</title>
    <link rel="stylesheet" href="../../packages/core/runtime/pet-runtime.css" />
    <link rel="stylesheet" href="./desktop.css" />
  </head>
  <body>
    <main class="desktop-shell">
      <header class="drag-region development-only">
        <span>Companion Desktop</span>
        <output id="runtime-status">BOOTING</output>
      </header>
      <section id="pet-stage" aria-label="Companion pet"></section>
      <nav class="event-controls development-only" aria-label="Development event controls">
        <button type="button" data-event="TASK_START">Start</button>
        <button type="button" data-event="TASK_RUNNING">Run</button>
        <button type="button" data-event="TASK_SUCCESS">Success</button>
        <button type="button" data-event="TASK_ERROR">Error</button>
      </nav>
    </main>
    <script type="module" src="./src/runtime.js"></script>
  </body>
</html>
